name: pr-check

on:
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            testing-framework/requirements-dev.txt
      - name: Install deps
        working-directory: testing-framework
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - run: ruff check .
        working-directory: testing-framework
      - run: mypy .
        working-directory: testing-framework

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt
            testing-framework/requirements-dev.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-dev.txt
      - name: Install testing-framework deps
        working-directory: testing-framework
        run: pip install -r requirements-dev.txt
      - name: pytest -m unit
        working-directory: testing-framework
        run: pytest -m unit -n auto --tb=short -q

  api-smoke:
    name: api + smoke ui
    runs-on: ubuntu-latest
    needs: [lint, unit]
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      BOT_USERNAME: ${{ secrets.BOT_USERNAME || 'mirea_events_bot' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-not-for-prod-but-32-bytes-long-xxxxx' }}
      DATABASE_URL: sqlite:///${{ github.workspace }}/backend/data/mirea-events.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            requirements-dev.txt
            testing-framework/requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install SUT deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build React SPA
        working-directory: frontend
        run: npm ci && npm run build

      - name: Bootstrap DB
        working-directory: backend
        run: python -m app.cli.init_project

      - name: Create QA second organizer
        working-directory: backend
        run: |
          python <<'PY'
          from app.admin.auth import hash_password
          from app.db import session_scope
          from app.models import Organizer
          with session_scope() as s:
              if not s.query(Organizer).filter_by(email="qa-second@mirea.ru").first():
                  s.add(Organizer(
                      email="qa-second@mirea.ru",
                      password_hash=hash_password("organizer12345"),
                      name="QA Second Organizer",
                      department="QA",
                      role="organizer",
                  ))
          PY

      - name: Start SUT
        working-directory: backend
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8080 \
            > ../sut.log 2>&1 &
          echo "SUT_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for SUT
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8080/api/v1/healthz > /dev/null && exit 0
            sleep 1
          done
          cat sut.log || true && exit 1

      - name: Install testing-framework deps
        working-directory: testing-framework
        run: pip install -r requirements-dev.txt

      - name: Install Playwright
        working-directory: testing-framework
        run: python -m playwright install --with-deps chromium

      - name: Configure .env
        working-directory: testing-framework
        run: |
          cp .env.example .env
          echo "QA_BASE_URL=http://127.0.0.1:8080" >> .env

      - name: pytest api + smoke
        working-directory: testing-framework
        run: |
          pytest -m "api or (ui and smoke)" \
            --ignore=tests/unit --ignore=tests/e2e \
            --alluredir=reports/allure-raw \
            --html=reports/html/report.html --self-contained-html \
            --tb=short -q

      - name: Stop SUT
        if: always()
        run: kill "$SUT_PID" 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-check-reports-${{ github.event.pull_request.number }}
          path: |
            sut.log
            testing-framework/reports/allure-raw
            testing-framework/reports/html
          if-no-files-found: ignore
          retention-days: 7
