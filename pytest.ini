[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning:passlib.*
    # datetime.utcnow() — DeprecationWarning из stdlib Python 3.12+.
    # В проекте 200+ вызовов на критическом пути; миграция на
    # datetime.now(UTC) — отдельная задача с риском регрессии в логике
    # сравнения «aware vs naive». До тех пор глушим, чтобы вывод тестов
    # был читаемым (иначе 449 строк deprecation warnings заслоняют
    # реальные ошибки, если они появятся).
    ignore:datetime.datetime.utcnow:DeprecationWarning
